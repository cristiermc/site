<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 1</title>
</head>
<body>
    <header>
        <h1>Formulário para Candidatura</h1>
        <img src="https://imgs.search.brave.com/ngTuPKyn_CvtYptTTMapf2y5GrW6L_-XQxEEDJPVj3c/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWcu/ZnJlZXBpay5jb20v/Zm90b3MtcHJlbWl1/bS9mb3JtdWxhcmlv/LWRlLWluc2NyaWNh/by1vbi1saW5lLXBh/cmEtcmVnaXN0cm8t/bW9kZXJuby1uby1z/aXRlLWRhLWludGVy/bmV0XzMxOTY1LTIz/ODI3My5qcGc_c2Vt/dD1haXNfaHlicmlk/Jnc9NzQw" alt="Imagem de um formulário" title="Imagem de um formulário">
    </header>

    <section>
        <h2>Preencha suas informações</h2>
        <form action="" id="form">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="0" required><br><br>

            <label for="materia">Matéria de Interesse:</label>
            <select id="materia" name="materia">
                <option value="">Selecione uma matéria</option>
                <option value="matematica">Matemática</option>
                <option value="portugues">Português</option>
                <option value="ciencias">Ciências</option>
            </select><br><br>

            <label for="escolaridade">Escolaridade:</label><br>
            <input type="radio" id="ensino-medio" name="escolaridade" value="ensino-medio" required>
            <label for="ensino-medio">Ensino Médio</label><br>
            <input type="radio" id="graduacao" name="escolaridade" value="graduacao">
            <label for="graduacao">Graduação</label><br>
            <input type="radio" id="pos-graduacao" name="escolaridade" value="pos-graduacao">
            <label for="pos-graduacao">Pós-Graduação</label><br><br>

            <label for="mensagem">Descrição sobre si  mesmo:</label><br>
            <textarea id="mensagem" name="mensagem" rows="4" cols="50" placeholder="Escreva sua descrição aqui..." maxlength="200"></textarea><br><br>

            <input type="submit" value="Enviar">
        </form>
</body>
</html>
