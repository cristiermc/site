<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script_atv2.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto</title>
</head>
<body>
    <header>
        <h1>Calculadora de Desconto</h1>
    </header>
    <section>
        <label>Digite o valor do produto:</label>
        <input type="number" id="valorProduto" min="0">
        <label>Digite a porcentagem de desconto:</label>
        <input type="number" id="porcentagemDesconto" min="0" max="100">
        <button onclick="calcularDesconto()">Calcular Desconto</button>
        <p id="resultado"></p>
    </section>
</body>
</html>
